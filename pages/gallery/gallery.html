<!doctype html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8" />
    <meta name='description' content='Freewd服务器图片画廊 - 自动加载img/gallery文件夹中的图片' />
    <link rel="icon" type="image/png" href="/img/index/FreewdIcon.png">
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        * {
          margin: 0;
          padding: 0;
          box-sizing: border-box;
        }
        
        :root {
          --primary-color: #4db8ff;
          --primary-light: #66cfff;
          --primary-dark: #0077cc;
          --secondary-color: #f59e0b;
          --text-primary: #e0e0e0;
          --text-secondary: #a0a0a0;
          --bg-light: #111;
          --bg-white: #0f0f0f;
          --bg-card: rgba(30, 30, 30, 0.9);
          --border-color: rgba(100, 100, 100, 0.2);
          --shadow-sm: 0 1px 3px rgba(0, 0, 0, 0.5);
          --shadow-md: 0 4px 6px -1px rgba(0, 0, 0, 0.5), 0 2px 4px -1px rgba(0, 0, 0, 0.3);
          --shadow-lg: 0 10px 15px -3px rgba(0, 0, 0, 0.5), 0 4px 6px -2px rgba(0, 0, 0, 0.3);
          --radius-sm: 0.375rem;
          --radius-md: 0.5rem;
          --radius-lg: 0.75rem;
          --radius-xl: 1rem;
          --radius-full: 9999px;
          --navbar-height: 4.5rem;
        }
        
        body {
          font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
          line-height: 1.6;
          color: var(--text-primary);
          background-color: var(--bg-light);
          overflow-x: hidden;
          background-image: linear-gradient(rgba(0, 0, 0, 0.8), rgba(0, 0, 0, 0.8));
          background-size: cover;
          background-position: center;
          background-attachment: fixed;
          padding-top: var(--navbar-height);
        }
        
        .container {
          width: 100%;
          max-width: 1400px;
          margin: 0 auto;
          padding: 0 1.5rem;
        }
        
        .navbar {
          position: fixed;
          top: 0;
          width: 100%;
          background-color: rgba(15, 15, 20, 0.9);
          backdrop-filter: blur(10px);
          z-index: 1000;
          box-shadow: var(--shadow-sm);
          transition: all 0.3s ease;
          height: var(--navbar-height);
        }
        
        .nav-container {
          display: flex;
          justify-content: space-between;
          align-items: center;
          padding: 1rem 1.5rem;
          max-width: 1400px;
          margin: 0 auto;
          height: 100%;
        }
        
        .nav-logo {
          display: flex;
          align-items: center;
          gap: 0.75rem;
          text-decoration: none;
        }
        
        .logo-img {
          height: 2.5rem;
          width: 2.5rem;
          border-radius: 8px;
          filter: drop-shadow(0 2px 4px rgba(77, 184, 255, 0.2));
          object-fit: contain;
        }
        
        .logo-text {
          font-size: 1.5rem;
          font-weight: 700;
          background: linear-gradient(135deg, var(--primary-color), var(--primary-light));
          -webkit-background-clip: text;
          background-clip: text;
          color: transparent;
        }
        
        .nav-links {
          display: flex;
          gap: 2rem;
        }
        
        .nav-links a {
          color: var(--text-secondary);
          text-decoration: none;
          font-weight: 500;
          transition: color 0.3s ease;
        }
        
        .nav-links a:hover {
          color: var(--primary-color);
        }
        
        .hero {
          padding: 4rem 0 4rem;
          background: linear-gradient(135deg, rgba(10, 10, 15, 0.9) 0%, rgba(20, 20, 30, 0.8) 100%);
          position: relative;
          overflow: hidden;
        }
        
        .hero::before {
          content: '';
          position: absolute;
          top: 0;
          left: 0;
          right: 0;
          height: 100%;
          background:
            radial-gradient(circle at 20% 80%, rgba(77, 184, 255, 0.1) 0%, transparent 50%),
            radial-gradient(circle at 80% 20%, rgba(245, 158, 11, 0.1) 0%, transparent 50%);
          z-index: 0;
        }
        
        .hero-container {
          display: flex;
          flex-direction: column;
          align-items: center;
          justify-content: center;
          text-align: center;
          max-width: 1400px;
          margin: 0 auto;
          padding: 0 1.5rem;
          position: relative;
          z-index: 1;
        }
        
        .hero-title {
          font-size: 3rem;
          font-weight: 800;
          line-height: 1.1;
          margin-bottom: 1.5rem;
          letter-spacing: -0.025em;
        }
        
        .gradient-text {
          background: linear-gradient(135deg, var(--primary-color), var(--secondary-color));
          -webkit-background-clip: text;
          background-clip: text;
          color: transparent;
          display: inline-block;
        }
        
        .hero-description {
          font-size: 1.25rem;
          color: var(--text-secondary);
          margin-bottom: 2.5rem;
          max-width: 800px;
        }
        
        .controls {
          display: flex;
          flex-wrap: wrap;
          gap: 1rem;
          justify-content: center;
          margin-bottom: 2rem;
        }
        
        .btn {
          display: inline-flex;
          align-items: center;
          justify-content: center;
          padding: 0.875rem 2rem;
          font-size: 1rem;
          font-weight: 600;
          border-radius: var(--radius-md);
          border: none;
          cursor: pointer;
          transition: all 0.3s ease;
          text-decoration: none;
          gap: 0.5rem;
        }
        
        .btn-primary {
          background: linear-gradient(135deg, var(--primary-color), var(--primary-light));
          color: white;
          box-shadow: 0 4px 12px rgba(77, 184, 255, 0.3);
        }
        
        .btn-primary:hover {
          transform: translateY(-2px);
          box-shadow: 0 8px 20px rgba(77, 184, 255, 0.4);
        }
        
        .btn-secondary {
          background-color: rgba(255, 255, 255, 0.1);
          color: var(--text-primary);
          border: 1px solid var(--border-color);
        }
        
        .btn-secondary:hover {
          border-color: var(--primary-color);
          color: var(--primary-color);
          transform: translateY(-2px);
          box-shadow: var(--shadow-md);
        }
        
        .filter-buttons {
          display: flex;
          flex-wrap: wrap;
          justify-content: center;
          gap: 0.5rem;
          margin: 1.5rem 0 2.5rem;
        }
        
        .filter-btn {
          padding: 0.5rem 1.25rem;
          background-color: rgba(255, 255, 255, 0.05);
          border: 1px solid var(--border-color);
          border-radius: var(--radius-full);
          color: var(--text-secondary);
          cursor: pointer;
          transition: all 0.3s ease;
        }
        
        .filter-btn:hover, .filter-btn.active {
          background-color: var(--primary-color);
          color: white;
          border-color: var(--primary-color);
        }
        
        .gallery {
          padding: 3rem 0 6rem;
          background-color: var(--bg-white);
        }
        
        .gallery-grid {
          display: grid;
          grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
          gap: 1.5rem;
          margin-top: 2rem;
        }
        
        .gallery-item {
          background-color: var(--bg-card);
          border-radius: var(--radius-lg);
          overflow: hidden;
          box-shadow: var(--shadow-md);
          transition: all 0.3s ease;
          position: relative;
          cursor: pointer;
          aspect-ratio: 16/9;
        }
        
        .gallery-item:hover {
          transform: translateY(-8px);
          box-shadow: var(--shadow-lg);
        }
        
        .gallery-img {
          width: 100%;
          height: 100%;
          object-fit: cover;
          display: block;
          transition: transform 0.5s ease;
        }
        
        .gallery-item:hover .gallery-img {
          transform: scale(1.05);
        }
        
        .gallery-info {
          position: absolute;
          bottom: 0;
          left: 0;
          right: 0;
          background: linear-gradient(to top, rgba(0, 0, 0, 0.8), transparent);
          padding: 1.5rem 1rem 1rem;
          color: white;
          transform: translateY(100%);
          transition: transform 0.3s ease;
        }
        
        .gallery-item:hover .gallery-info {
          transform: translateY(0);
        }
        
        .gallery-title {
          font-size: 1.1rem;
          font-weight: 600;
          margin-bottom: 0.5rem;
        }
        
        .gallery-date {
          font-size: 0.875rem;
          color: #ccc;
        }
        
        .pagination {
          display: flex;
          justify-content: center;
          align-items: center;
          gap: 0.5rem;
          margin-top: 3rem;
        }
        
        .page-btn {
          width: 2.5rem;
          height: 2.5rem;
          display: flex;
          align-items: center;
          justify-content: center;
          border-radius: var(--radius-md);
          background-color: var(--bg-card);
          border: 1px solid var(--border-color);
          color: var(--text-primary);
          cursor: pointer;
          transition: all 0.3s ease;
        }
        
        .page-btn:hover, .page-btn.active {
          background-color: var(--primary-color);
          color: white;
        }
        
        .page-btn.disabled {
          opacity: 0.5;
          cursor: not-allowed;
        }
        
        .image-counter {
          text-align: center;
          color: var(--text-secondary);
          margin-top: 1rem;
        }
        
        .loading {
          text-align: center;
          padding: 3rem;
          color: var(--text-secondary);
          font-size: 1.2rem;
        }
        
        .error-message {
          text-align: center;
          padding: 3rem;
          color: #ff6b6b;
          background-color: rgba(255, 107, 107, 0.1);
          border-radius: var(--radius-lg);
          margin: 2rem 0;
        }
        
        /* 图片查看器模态框 */
        .modal {
          display: none;
          position: fixed;
          top: 0;
          left: 0;
          width: 100%;
          height: 100%;
          background-color: rgba(0, 0, 0, 0.9);
          z-index: 2000;
          justify-content: center;
          align-items: center;
        }
        
        .modal-content {
          max-width: 90%;
          max-height: 90%;
          border-radius: var(--radius-lg);
          overflow: hidden;
          box-shadow: 0 0 40px rgba(0, 0, 0, 0.8);
        }
        
        .modal-img {
          width: 100%;
          height: auto;
          display: block;
        }
        
        .modal-close {
          position: absolute;
          top: 1.5rem;
          right: 1.5rem;
          font-size: 2rem;
          color: white;
          cursor: pointer;
          background: rgba(0, 0, 0, 0.5);
          width: 3rem;
          height: 3rem;
          border-radius: 50%;
          display: flex;
          align-items: center;
          justify-content: center;
          transition: all 0.3s ease;
        }
        
        .modal-close:hover {
          background: rgba(255, 255, 255, 0.1);
        }
        
        .modal-nav {
          position: absolute;
          top: 50%;
          transform: translateY(-50%);
          width: 3rem;
          height: 3rem;
          background: rgba(0, 0, 0, 0.5);
          border-radius: 50%;
          display: flex;
          align-items: center;
          justify-content: center;
          color: white;
          cursor: pointer;
          font-size: 1.5rem;
          transition: all 0.3s ease;
        }
        
        .modal-nav:hover {
          background: rgba(255, 255, 255, 0.1);
        }
        
        .modal-prev {
          left: 1.5rem;
        }
        
        .modal-next {
          right: 1.5rem;
        }
        
        .modal-info {
          position: absolute;
          bottom: 0;
          left: 0;
          right: 0;
          background: linear-gradient(to top, rgba(0, 0, 0, 0.8), transparent);
          padding: 2rem;
          color: white;
        }
        
        .modal-title {
          font-size: 1.5rem;
          font-weight: 600;
          margin-bottom: 0.5rem;
        }
        
        .modal-desc {
          font-size: 1rem;
          color: #ccc;
        }
        
        .footer {
          background-color: var(--text-primary);
          color: var(--bg-light);
          padding: 4rem 0 2rem;
          text-align: center;
        }
        
        .footer-content {
          display: grid;
          grid-template-columns: 1fr;
          gap: 3rem;
          margin-bottom: 3rem;
        }
        
        .footer-logo {
          display: flex;
          align-items: center;
          justify-content: center;
          gap: 0.75rem;
          margin-bottom: 1rem;
        }
        
        .footer p {
          color: #666;
          line-height: 1.7;
          max-width: 500px;
          margin: 0 auto;
        }
        
        .footer-bottom {
          border-top: 1px solid rgba(255, 255, 255, 0.1);
          padding-top: 2rem;
          text-align: center;
          color: #888;
          font-size: 0.875rem;
        }
        
        .fade-in {
          opacity: 0;
          transform: translateY(20px);
          transition: opacity 0.8s ease, transform 0.8s ease;
        }
        
        .fade-in.visible {
          opacity: 1;
          transform: translateY(0);
        }
        
        @media (max-width: 768px) {
          .hero-title {
            font-size: 2.5rem;
          }
        
          .hero-description {
            font-size: 1.125rem;
          }
        
          .gallery-grid {
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
          }
          
          .nav-links {
            display: none;
          }
        }
        
        @media (max-width: 640px) {
          body {
            padding-top: 4rem;
          }
        
          .hero {
            padding: 2rem 0 3rem;
          }
        
          .hero-title {
            font-size: 2rem;
          }
        
          .hero-description {
            font-size: 1rem;
          }
        
          .btn {
            padding: 0.75rem 1.5rem;
            font-size: 0.875rem;
          }
        
          .gallery {
            padding: 2rem 0 4rem;
          }
        
          .gallery-grid {
            grid-template-columns: 1fr;
          }
          
          .modal-nav, .modal-close {
            width: 2.5rem;
            height: 2.5rem;
            font-size: 1.25rem;
          }
          
          .modal-prev {
            left: 1rem;
          }
          
          .modal-next {
            right: 1rem;
          }
          
          .modal-close {
            top: 1rem;
            right: 1rem;
          }
        }
    </style>
</head>

    <script>
        // 配置文件
        const CONFIG = {
            imagesJsonUrl: 'pages/gallery/img.json',  // JSON数据文件路径
            galleryFolder: 'img/gallery/',      // 图片文件夹路径
            imagesPerPage: 12                     // 每页显示图片数量
        };
        
        // 状态变量
        let allImages = [];
        let filteredImages = [];
        let currentPage = 1;
        let currentFilter = 'all';
        let currentImageIndex = 0;
        
        // DOM元素
        const galleryGrid = document.getElementById('gallery-grid');
        const pagination = document.getElementById('pagination');
        const imageCounter = document.getElementById('image-counter');
        const loadingElement = document.getElementById('loading');
        const errorMessage = document.getElementById('error-message');
        const filterButtons = document.querySelectorAll('.filter-btn');
        
        // 图片查看器元素
        const imageModal = document.getElementById('imageModal');
        const modalImage = document.getElementById('modalImage');
        const modalTitle = document.getElementById('modalTitle');
        const modalDesc = document.getElementById('modalDesc');
        const modalClose = document.getElementById('modalClose');
        const modalPrev = document.getElementById('modalPrev');
        const modalNext = document.getElementById('modalNext');
        
        // 初始化页面
        document.addEventListener('DOMContentLoaded', async function() {
            setupEventListeners();
            setupIntersectionObserver();
            await loadImages();
        });
        
        // 从JSON文件加载图片数据
        async function loadImages() {
            try {
                loadingElement.textContent = "正在加载图片数据...";
                
                const response = await fetch(CONFIG.imagesJsonUrl);
                if (!response.ok) {
                    throw new Error(`HTTP错误! 状态: ${response.status}`);
                }
                
                const data = await response.json();
                
                if (!data.images || !Array.isArray(data.images)) {
                    throw new Error("图片数据格式不正确");
                }
                
                // 处理图片数据，添加完整路径
                allImages = data.images.map(img => ({
                    ...img,
                    src: CONFIG.galleryFolder + img.filename
                }));
                
                loadingElement.style.display = 'none';
                
                if (allImages.length === 0) {
                    showError("图片库为空，请添加图片到JSON文件中");
                    return;
                }
                
                // 应用默认过滤
                filteredImages = [...allImages];
                updateGallery();
                imageCounter.style.display = 'block';
                
            } catch (error) {
                console.error("加载图片时出错:", error);
                loadingElement.style.display = 'none';
                showError(`无法加载图片: ${error.message}`);
            }
        }
        
        // 显示错误信息
        function showError(message) {
            errorMessage.innerHTML = message;
            errorMessage.style.display = 'block';
        }
        
        // 设置事件监听器
        function setupEventListeners() {
            // 过滤按钮点击事件
            filterButtons.forEach(button => {
                button.addEventListener('click', function() {
                    // 更新激活状态
                    filterButtons.forEach(btn => btn.classList.remove('active'));
                    this.classList.add('active');
                    
                    // 更新过滤条件
                    currentFilter = this.dataset.filter;
                    currentPage = 1;
                    
                    // 过滤图片
                    if (currentFilter === 'all') {
                        filteredImages = [...allImages];
                    } else {
                        filteredImages = allImages.filter(image => 
                            image.filter.includes(currentFilter)
                        );
                    }
                    
                    // 更新画廊
                    updateGallery();
                });
            });
            
            // 图片查看器事件
            modalClose.addEventListener('click', closeModal);
            modalPrev.addEventListener('click', showPrevImage);
            modalNext.addEventListener('click', showNextImage);
            
            // 点击模态框背景关闭
            imageModal.addEventListener('click', function(e) {
                if (e.target === imageModal) {
                    closeModal();
                }
            });
            
            // 键盘导航
            document.addEventListener('keydown', function(e) {
                if (imageModal.style.display === 'flex') {
                    if (e.key === 'Escape') closeModal();
                    if (e.key === 'ArrowLeft') showPrevImage();
                    if (e.key === 'ArrowRight') showNextImage();
                }
            });
        }
        
        // 更新画廊显示
        function updateGallery() {
            // 更新图片计数器
            imageCounter.textContent = `共 ${filteredImages.length} 张图片`;
            
            // 清空画廊
            galleryGrid.innerHTML = '';
            
            if (filteredImages.length === 0) {
                galleryGrid.innerHTML = '<div class="error-message">没有找到匹配的图片</div>';
                pagination.style.display = 'none';
                return;
            }
            
            // 计算分页
            const totalPages = Math.ceil(filteredImages.length / CONFIG.imagesPerPage);
            const startIndex = (currentPage - 1) * CONFIG.imagesPerPage;
            const endIndex = Math.min(startIndex + CONFIG.imagesPerPage, filteredImages.length);
            const pageImages = filteredImages.slice(startIndex, endIndex);
            
            // 创建图片元素
            pageImages.forEach((image, index) => {
                const galleryItem = document.createElement('div');
                galleryItem.className = 'gallery-item fade-in';
                galleryItem.dataset.index = startIndex + index;
                
                // 添加图片懒加载
                galleryItem.innerHTML = `
                    <img src="${image.src}" alt="${image.title}" class="gallery-img" loading="lazy" onerror="this.src='/img/placeholder.jpg'">
                    <div class="gallery-info">
                        <h4 class="gallery-title">${image.title}</h4>
                        <p class="gallery-date">${image.date}</p>
                    </div>
                `;
                
                // 添加点击事件
                galleryItem.addEventListener('click', () => openModal(startIndex + index));
                
                galleryGrid.appendChild(galleryItem);
            });
            
            // 更新分页
            updatePagination(totalPages);
            pagination.style.display = totalPages > 1 ? 'flex' : 'none';
            
            // 重新观察新增的元素
            setupIntersectionObserver();
        }
        
        // 更新分页控件
        function updatePagination(totalPages) {
            pagination.innerHTML = '';
            
            if (totalPages <= 1) return;
            
            // 上一页按钮
            const prevButton = document.createElement('button');
            prevButton.className = `page-btn ${currentPage === 1 ? 'disabled' : ''}`;
            prevButton.innerHTML = '&laquo;';
            prevButton.addEventListener('click', () => {
                if (currentPage > 1) {
                    currentPage--;
                    updateGallery();
                    window.scrollTo({ top: galleryGrid.offsetTop - 100, behavior: 'smooth' });
                }
            });
            pagination.appendChild(prevButton);
            
            // 页码按钮
            const maxVisiblePages = 5;
            let startPage = Math.max(1, currentPage - Math.floor(maxVisiblePages / 2));
            let endPage = Math.min(totalPages, startPage + maxVisiblePages - 1);
            
            if (endPage - startPage + 1 < maxVisiblePages) {
                startPage = Math.max(1, endPage - maxVisiblePages + 1);
            }
            
            for (let i = startPage; i <= endPage; i++) {
                const pageButton = document.createElement('button');
                pageButton.className = `page-btn ${i === currentPage ? 'active' : ''}`;
                pageButton.textContent = i;
                pageButton.addEventListener('click', () => {
                    currentPage = i;
                    updateGallery();
                    window.scrollTo({ top: galleryGrid.offsetTop - 100, behavior: 'smooth' });
                });
                pagination.appendChild(pageButton);
            }
            
            // 下一页按钮
            const nextButton = document.createElement('button');
            nextButton.className = `page-btn ${currentPage === totalPages ? 'disabled' : ''}`;
            nextButton.innerHTML = '&raquo;';
            nextButton.addEventListener('click', () => {
                if (currentPage < totalPages) {
                    currentPage++;
                    updateGallery();
                    window.scrollTo({ top: galleryGrid.offsetTop - 100, behavior: 'smooth' });
                }
            });
            pagination.appendChild(nextButton);
        }
        
        // 打开图片查看器
        function openModal(index) {
            currentImageIndex = parseInt(index);
            const image = filteredImages[currentImageIndex];
            
            modalImage.src = image.src;
            modalImage.alt = image.title;
            modalTitle.textContent = image.title;
            modalDesc.textContent = image.desc;
            
            imageModal.style.display = 'flex';
            document.body.style.overflow = 'hidden';
        }
        
        // 关闭图片查看器
        function closeModal() {
            imageModal.style.display = 'none';
            document.body.style.overflow = 'auto';
        }
        
        // 显示上一张图片
        function showPrevImage() {
            if (currentImageIndex > 0) {
                currentImageIndex--;
            } else {
                currentImageIndex = filteredImages.length - 1;
            }
            
            const image = filteredImages[currentImageIndex];
            modalImage.src = image.src;
            modalImage.alt = image.title;
            modalTitle.textContent = image.title;
            modalDesc.textContent = image.desc;
        }
        
        // 显示下一张图片
        function showNextImage() {
            if (currentImageIndex < filteredImages.length - 1) {
                currentImageIndex++;
            } else {
                currentImageIndex = 0;
            }
            
            const image = filteredImages[currentImageIndex];
            modalImage.src = image.src;
            modalImage.alt = image.title;
            modalTitle.textContent = image.title;
            modalDesc.textContent = image.desc;
        }
        
        // 设置滚动动画观察器
        function setupIntersectionObserver() {
            const fadeElements = document.querySelectorAll('.fade-in:not(.visible)');
            
            const fadeInObserver = new IntersectionObserver((entries) => {
                entries.forEach(entry => {
                    if (entry.isIntersecting) {
                        entry.target.classList.add('visible');
                    }
                });
            }, { threshold: 0.1 });
            
            fadeElements.forEach(element => {
                fadeInObserver.observe(element);
            });
        }
        
        // 图片加载失败时的备用图片
        window.addEventListener('error', function(e) {
            if (e.target.tagName === 'IMG' && e.target.src.includes(CONFIG.galleryFolder)) {
                e.target.src = 'img/freewd_title.png'; // 备用图片
                e.target.alt = '图片加载失败';
            }
        }, true);
    </script>
</body>
</html>
